query CompanyFindMany {
  Company {
    findMany {
      items {
        id
        name
        active
      }
    }
  }
}

fragment FlowDefinitionFields on FlowDefinition {
  id
  companyId
  documentType
  name
  version
  state
  initialStatusId
  statuses {
    id
    name
    kind
    editableActions {
      action
      allowedRoles
    }
    approval {
      allowSelfApproval
      approvedTransitionId
      rejectedTransitionId
      rules {
        id
        minAmount
        approvers {
          type
          userId
          roleId
        }
      }
    }
  }
  transitions {
    id
    label
    fromStatusId
    toStatusId
    allowedRoles
    requiresComment
    sortOrder
  }
}

fragment FlowRuntimeStateFields on FlowRuntimeState {
  documentId
  documentType
  flowId
  flowVersion
  currentStatus {
    id
    name
    kind
    editableActions {
      action
      allowedRoles
    }
    approval {
      allowSelfApproval
      approvedTransitionId
      rejectedTransitionId
      rules {
        id
        minAmount
        approvers {
          type
          userId
          roleId
        }
      }
    }
  }
  editPolicy {
    editableActions
    blockedActions {
      action
      reason
    }
    editableItemIds
  }
  availableTransitions {
    id
    label
    toStatusId
    toStatusName
  }
  blockedTransitions {
    id
    label
    reason
  }
  pendingApproval {
    occurrenceId
    statusId
    approvalRuleId
    recordedApprovals
    canCurrentUserApprove
    canCurrentUserReject
  }
}

query FlowDefinitions($documentType: FlowDocumentType, $companyId: ID) {
  Flow {
    definitions(documentType: $documentType, companyId: $companyId) {
      ...FlowDefinitionFields
    }
  }
}

query FlowDefinitionHistory($flowId: ID!, $companyId: ID) {
  Flow {
    history(flowId: $flowId, companyId: $companyId) {
      ...FlowDefinitionFields
    }
  }
}

query RequisitionFlowState($requisitionId: Int!) {
  Flow {
    requisitionState(requisitionId: $requisitionId) {
      ...FlowRuntimeStateFields
    }
  }
}

query OrderFlowState($orderId: Int!) {
  Flow {
    orderState(orderId: $orderId) {
      ...FlowRuntimeStateFields
    }
  }
}
